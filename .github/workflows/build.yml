            libminiupnpc-dev libqrencode-dev libcurl4-openssl-dev libgmp-dev \
            libqt5gui5 libqt5core5a libqt5dbus5 qttools5-dev qttools5-dev-tools \
            libprotobuf-dev protobuf-compiler git

      - name: Build daemon
        run: |
          cd src
          make USE_NATIVETOR=- -f makefile.unix -j$(nproc)

      - name: Build Qt wallet
        run: |
          sed -i 's/LIBS += -lcurl -lssl -lcrypto -lcrypt32 -lssh2 -lgcrypt -lidn2 -lgpg-error -lunistring -lwldap32 -ldb_cxx$$BDB_LIB_SUFFIX/LIBS += -lcurl -lssl -lcrypto -ldb_cxx$$BDB_LIB_SUFFIX/' innova-qt.pro
          strip --remove-section=.note.ABI-tag /usr/lib/x86_64-linux-gnu/libQt5Core.so.5 || true
          qmake USE_UPNP=1 USE_QRCODE=1 USE_NATIVETOR=- innova-qt.pro
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p innova-${{ needs.get-version.outputs.version }}-debian11-x86_64
          cp src/innovad Innova innova-${{ needs.get-version.outputs.version }}-debian11-x86_64/
          strip innova-${{ needs.get-version.outputs.version }}-debian11-x86_64/*
          cd innova-${{ needs.get-version.outputs.version }}-debian11-x86_64
          sha256sum * > SHA256SUMS.txt
          cd ..
          tar -czf innova-${{ needs.get-version.outputs.version }}-debian11-x86_64.tar.gz \
            innova-${{ needs.get-version.outputs.version }}-debian11-x86_64/

      - uses: actions/upload-artifact@v4
        with:
          name: innova-debian11-x86_64
          path: innova-${{ needs.get-version.outputs.version }}-debian11-x86_64.tar.gz

  # ─────────────────────────────────────────────────────────
  # Fedora 41 x86_64 (daemon + Qt) via Docker
  # ─────────────────────────────────────────────────────────
  build-fedora-41:
    runs-on: ubuntu-22.04
    needs: get-version
    container:
      image: fedora:41
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          dnf install -y gcc-c++ make libtool automake pkgconfig \
