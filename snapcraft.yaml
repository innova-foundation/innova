# Innova - Snapcraft Build - Known to build in most Ubuntu Versions
# https://innova-foundation.com
# https://github.com/innova-foundation/innova
# By Carsen Klock - Edited by CircuitBreaker
name: innova
version: '5.0.0.0'
summary: Innova
description: |
  An open source hybrid cryptocurrency called Innova, which features Collateral Nodes (Masternodes), Staking, Mining, Multisig, and much more!

grade: stable
confinement: strict
base: core22

plugs: # plugs for theming, font settings, cursor and to use gtk3 file chooser
  gtk-3-themes:
    interface: content
    target: $SNAP/data-dir/themes
    default-provider: gtk-common-themes:gtk-3-themes
  icon-themes:
    interface: content
    target: $SNAP/data-dir/icons
    default-provider: gtk-common-themes:icon-themes
  sound-themes:
    interface: content
    target: $SNAP/data-dir/sounds
    default-provider: gtk-common-themes:sounds-themes

apps:
  innovad:
    command: bin/innovad
    plugs: [home, network, network-bind]
    daemon: forking
  daemon:
    command: bin/innovad
    plugs: [home, network, network-bind]
    environment:
      XDG_DATA_DIRS: $SNAP_USER_DATA:/var/lib/snapd/desktop:$XDG_DATA_DIRS
      # Override HOME so the datadir is located at
      # ~/snap/innova/common/.innova/ instead of
      # ~/snap/innova/current/.innova/, and each new version of the
      # snap won't have a different data directory:
      # https://docs.snapcraft.io/environment-variables/7983
      HOME: $SNAP_USER_COMMON
  innova:
    command: bin/Innova
    plugs: [home, network, network-bind, unity7, wayland, desktop-legacy, desktop, x11, gsettings]
    desktop: innova.desktop
    environment:
      QT_QPA_PLATFORMTHEME: gtk3
      XDG_DATA_DIRS: $SNAP_USER_DATA:/var/lib/snapd/desktop:$XDG_DATA_DIRS
      HOME: $SNAP_USER_COMMON

parts:
  daemon:
    source: .
    plugin: nil
    build-packages:
      - g++
      - build-essential
      - zlib1g-dev
      - libdb++-dev
      - libboost-all-dev
      - libqrencode-dev
      - libminiupnpc-dev
      - libevent-dev
      - libcurl4-openssl-dev
      - libssl-dev
      - libtool
      - libminizip-dev
    stage-packages:
      - libdb5.3++
      - libboost-system1.74.0
      - libboost-filesystem1.74.0
      - libboost-program-options1.74.0
      - libboost-thread1.74.0
      - libboost-chrono1.74.0
      - libqrencode4
      - libminiupnpc17
      - libevent-2.1-7
      - libcurl4
      - libssl3
      - libminizip1
    override-build: |
      set -x
      ARCH=$(uname -m)
      MF=makefile.unix
      if [ "$ARCH" = "armv7l" ] || [ "$ARCH" = "armv6l" ] || [ "$ARCH" = "aarch64" ]; then
          MF="makefile.arm"
      elif [ "$ARCH" = "x86_64" ] || [ "$ARCH" = "i686" ] || [ "$ARCH" = "i386" ]; then
          MF="makefile.unix"
      else
          MF="makefile.arm"
      fi
      cd src
      make -f "${MF}" -j4
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin
      cp $SNAPCRAFT_PART_BUILD/src/innovad $SNAPCRAFT_PART_INSTALL/bin
  innova:
    source: .
    plugin: nil
    build-packages:
      - g++
      - build-essential
      - zlib1g-dev
      - libdb++-dev
      - libboost-all-dev
      - libqrencode-dev
      - libminiupnpc-dev
      - libevent-dev
      - libcurl4-openssl-dev
      - libssl-dev
      - libtool
      - libminizip-dev
      - libqt5gui5
      - libqt5core5a
      - libqt5dbus5
      - qttools5-dev
      - qttools5-dev-tools
      - qtbase5-dev
      - qtbase5-dev-tools
    stage-packages:
      - libdb5.3++
      - libboost-system1.74.0
      - libboost-filesystem1.74.0
      - libboost-program-options1.74.0
      - libboost-thread1.74.0
      - libboost-chrono1.74.0
      - libqrencode4
      - libminiupnpc17
      - libevent-2.1-7
      - libcurl4
      - libssl3
      - libminizip1
      - libqt5gui5
      - libqt5core5a
      - libqt5dbus5
      - qtwayland5
    override-build: |
      set -x
      ARCH=$(uname -m)
      TOROPT="USE_NATIVETOR=-"
      sed -i 's/LIBS += -lcurl -lssl -lcrypto -lcrypt32 -lssh2 -lgcrypt -lidn2 -lgpg-error -lunistring -lwldap32 -ldb_cxx$$BDB_LIB_SUFFIX/LIBS += -lcurl -lssl -lcrypto -ldb_cxx$$BDB_LIB_SUFFIX/' $SNAPCRAFT_PART_BUILD/innova-qt.pro
      qmake "USE_UPNP=1" "USE_QRCODE=1" "${TOROPT}" innova-qt.pro
      make -j4
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin
      cp $SNAPCRAFT_PART_BUILD/Innova $SNAPCRAFT_PART_INSTALL/bin
  desktop:
    source: snap/gui
    plugin: dump
  hooks:
    plugin: dump
    source: hooks/
    organize:
      bin/: snap/hooks/

hooks:
  install:
    plugs: [network, network-bind]
  post-refresh:
    plugs: [network, network-bind]
  configure:
    plugs: [network, network-bind]
