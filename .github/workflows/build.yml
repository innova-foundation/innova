          path: innova-${{ needs.get-version.outputs.version }}-fedora40-x86_64.tar.gz

  # ─────────────────────────────────────────────────────────
  # Linux aarch64 Qt (daemon + Qt) via QEMU emulation
  # ─────────────────────────────────────────────────────────
  build-linux-arm64-qt:
    runs-on: ubuntu-22.04
    needs: get-version
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build daemon + Qt in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/build -w /build \
            debian:12 bash -c "
              apt-get update && \
              apt-get install -y build-essential libtool automake pkg-config \
                libssl-dev libevent-dev libboost-all-dev libdb++-dev \
                libminiupnpc-dev libcurl4-openssl-dev libgmp-dev \
                libqt5gui5 libqt5core5a libqt5dbus5 qttools5-dev qttools5-dev-tools \
                libprotobuf-dev protobuf-compiler git && \
              cd src && \
              make USE_NATIVETOR=- USE_IPFS=- -f makefile.unix -j\$(nproc) && \
              cd .. && \
              sed -i 's/LIBS += -lcurl -lssl -lcrypto -lcrypt32 -lssh2 -lgcrypt -lidn2 -lgpg-error -lunistring -lwldap32 -ldb_cxx\$\$BDB_LIB_SUFFIX/LIBS += -lcurl -lssl -lcrypto -ldb_cxx\$\$BDB_LIB_SUFFIX/' innova-qt.pro && \
              strip --remove-section=.note.ABI-tag /usr/lib/aarch64-linux-gnu/libQt5Core.so.5 || true && \
              qmake USE_UPNP=1 USE_QRCODE=1 USE_NATIVETOR=- USE_IPFS=- innova-qt.pro && \
              make -j\$(nproc)
            "

      - name: Package
        run: |
          mkdir -p innova-${{ needs.get-version.outputs.version }}-linux-aarch64-qt
          cp src/innovad innova-${{ needs.get-version.outputs.version }}-linux-aarch64-qt/ 2>/dev/null || true
          cp Innova innova-${{ needs.get-version.outputs.version }}-linux-aarch64-qt/ 2>/dev/null || true
          cd innova-${{ needs.get-version.outputs.version }}-linux-aarch64-qt
          sha256sum * > SHA256SUMS.txt 2>/dev/null || true
          cd ..
          tar -czf innova-${{ needs.get-version.outputs.version }}-linux-aarch64-qt.tar.gz \
            innova-${{ needs.get-version.outputs.version }}-linux-aarch64-qt/

      - uses: actions/upload-artifact@v4
        with:
          name: innova-linux-aarch64-qt
          path: innova-${{ needs.get-version.outputs.version }}-linux-aarch64-qt.tar.gz

  # ─────────────────────────────────────────────────────────
  # Raspberry Pi (armhf/armv7) — daemon only via QEMU emulation
  # ─────────────────────────────────────────────────────────
  build-linux-armhf:
    runs-on: ubuntu-22.04
    needs: get-version
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Build daemon in ARM container
        run: |
          docker run --rm --platform linux/arm/v7 \
            -v ${{ github.workspace }}:/build -w /build \
            debian:11 bash -c "
              apt-get update && \
              apt-get install -y build-essential libtool automake pkg-config \
                libssl-dev libevent-dev libboost-all-dev libdb++-dev \
                libminiupnpc-dev libcurl4-openssl-dev libgmp-dev git && \
              cd src && \
              make USE_NATIVETOR=- USE_IPFS=- -f makefile.unix -j\$(nproc)
            "

      - name: Package
        run: |
          mkdir -p innova-${{ needs.get-version.outputs.version }}-linux-armhf
          cp src/innovad innova-${{ needs.get-version.outputs.version }}-linux-armhf/ 2>/dev/null || true
          cd innova-${{ needs.get-version.outputs.version }}-linux-armhf
          sha256sum * > SHA256SUMS.txt 2>/dev/null || true
          cd ..
          tar -czf innova-${{ needs.get-version.outputs.version }}-linux-armhf.tar.gz \
            innova-${{ needs.get-version.outputs.version }}-linux-armhf/

      - uses: actions/upload-artifact@v4
        with:
          name: innova-linux-armhf
          path: innova-${{ needs.get-version.outputs.version }}-linux-armhf.tar.gz

  # ─────────────────────────────────────────────────────────
  # Create GitHub Release (only on version tags)
  # ─────────────────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    needs:
      - get-version
      - build-ubuntu-2204
      - build-ubuntu-2404
      - build-debian-11
      - build-debian-12
      - build-fedora-40
      - build-fedora-41
      - build-linux-arm64
      - build-linux-arm64-qt
      - build-linux-armhf
      - build-macos-arm64
      - build-windows
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.dmg" -o -name "*.zip" \) \
            -exec cp {} release-assets/ \;
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          echo "=== Release Assets ==="
          ls -lh
          echo ""
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Innova v${{ needs.get-version.outputs.version }}"
          body: "Official release binaries for Innova v${{ needs.get-version.outputs.version }}. See release notes above for details."
          files: release-assets/*
          draft: false
          prerelease: true
