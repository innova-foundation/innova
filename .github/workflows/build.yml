          cp src/innovad Innova innova-${{ needs.get-version.outputs.version }}-fedora40-x86_64/
          strip innova-${{ needs.get-version.outputs.version }}-fedora40-x86_64/*
          cd innova-${{ needs.get-version.outputs.version }}-fedora40-x86_64
          sha256sum * > SHA256SUMS.txt
