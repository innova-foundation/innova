        run: |
          sed -i 's/LIBS += -lcurl -lssl -lcrypto -lcrypt32 -lssh2 -lgcrypt -lidn2 -lgpg-error -lunistring -lwldap32 -ldb_cxx$$BDB_LIB_SUFFIX/LIBS += -lcurl -lssl -lcrypto -ldb_cxx$$BDB_LIB_SUFFIX/' innova-qt.pro
          qmake-qt5 USE_UPNP=1 USE_QRCODE=1 USE_NATIVETOR=- innova-qt.pro
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p innova-${{ needs.get-version.outputs.version }}-fedora41-x86_64
          cp src/innovad Innova innova-${{ needs.get-version.outputs.version }}-fedora41-x86_64/
          strip innova-${{ needs.get-version.outputs.version }}-fedora41-x86_64/*
          cd innova-${{ needs.get-version.outputs.version }}-fedora41-x86_64
          sha256sum * > SHA256SUMS.txt
          cd ..
          tar -czf innova-${{ needs.get-version.outputs.version }}-fedora41-x86_64.tar.gz \
            innova-${{ needs.get-version.outputs.version }}-fedora41-x86_64/

      - uses: actions/upload-artifact@v4
        with:
          name: innova-fedora41-x86_64
          path: innova-${{ needs.get-version.outputs.version }}-fedora41-x86_64.tar.gz

  # ─────────────────────────────────────────────────────────
  # Fedora 40 x86_64 (daemon + Qt) via Docker
  # ─────────────────────────────────────────────────────────
  build-fedora-40:
    runs-on: ubuntu-22.04
    needs: get-version
    container:
      image: fedora:40
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
