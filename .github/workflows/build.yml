name: Build & Release Innova

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
      - dev
      - idag
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  COIN_NAME: innova

jobs:
  # ─────────────────────────────────────────────────────────
  # Version detection
  # ─────────────────────────────────────────────────────────
  get-version:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(grep 'release-version=' build.properties | cut -d= -f2)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

  # ─────────────────────────────────────────────────────────
  # Ubuntu 22.04 x86_64 (daemon + Qt)
  # ─────────────────────────────────────────────────────────
  build-ubuntu-2204:
    runs-on: ubuntu-22.04
    needs: get-version
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config \
            libssl-dev libevent-dev bsdmainutils libboost-all-dev libdb++-dev \
            libminiupnpc-dev libqrencode-dev libcurl4-openssl-dev libgmp-dev \
            libsecp256k1-dev \
            libqt5gui5 libqt5core5a libqt5dbus5 qttools5-dev qttools5-dev-tools \
            libprotobuf-dev protobuf-compiler

      - name: Build daemon
        run: |
          cd src
          make USE_NATIVETOR=- -f makefile.unix -j$(nproc)

      - name: Build Qt wallet
        run: |
          sed -i 's/LIBS += -lcurl -lssl -lcrypto -lcrypt32 -lssh2 -lgcrypt -lidn2 -lgpg-error -lunistring -lwldap32 -ldb_cxx$$BDB_LIB_SUFFIX/LIBS += -lcurl -lssl -lcrypto -ldb_cxx$$BDB_LIB_SUFFIX/' innova-qt.pro
          sudo strip --remove-section=.note.ABI-tag /usr/lib/x86_64-linux-gnu/libQt5Core.so.5 || true
          qmake USE_UPNP=1 USE_QRCODE=1 USE_NATIVETOR=- innova-qt.pro
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p innova-${{ needs.get-version.outputs.version }}-ubuntu2204-x86_64
          cp src/innovad Innova innova-${{ needs.get-version.outputs.version }}-ubuntu2204-x86_64/
          strip innova-${{ needs.get-version.outputs.version }}-ubuntu2204-x86_64/*
          cd innova-${{ needs.get-version.outputs.version }}-ubuntu2204-x86_64
          sha256sum * > SHA256SUMS.txt
          cd ..
          tar -czf innova-${{ needs.get-version.outputs.version }}-ubuntu2204-x86_64.tar.gz \
            innova-${{ needs.get-version.outputs.version }}-ubuntu2204-x86_64/

      - uses: actions/upload-artifact@v4
        with:
          name: innova-ubuntu2204-x86_64
          path: innova-${{ needs.get-version.outputs.version }}-ubuntu2204-x86_64.tar.gz

  # ─────────────────────────────────────────────────────────
  # Ubuntu 24.04 x86_64 (daemon + Qt)
  # ─────────────────────────────────────────────────────────
  build-ubuntu-2404:
    runs-on: ubuntu-24.04
    needs: get-version
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config \
            libssl-dev libevent-dev bsdmainutils libboost-all-dev libdb++-dev \
            libminiupnpc-dev libqrencode-dev libcurl4-openssl-dev libgmp-dev \
            libsecp256k1-dev \
            libqt5gui5 libqt5core5a libqt5dbus5 qttools5-dev qttools5-dev-tools \
            libprotobuf-dev protobuf-compiler

      - name: Build daemon
        run: |
          cd src
          make USE_NATIVETOR=- -f makefile.unix -j$(nproc)

      - name: Build Qt wallet
        run: |
          sed -i 's/LIBS += -lcurl -lssl -lcrypto -lcrypt32 -lssh2 -lgcrypt -lidn2 -lgpg-error -lunistring -lwldap32 -ldb_cxx$$BDB_LIB_SUFFIX/LIBS += -lcurl -lssl -lcrypto -ldb_cxx$$BDB_LIB_SUFFIX/' innova-qt.pro
          sudo strip --remove-section=.note.ABI-tag /usr/lib/x86_64-linux-gnu/libQt5Core.so.5 || true
          qmake USE_UPNP=1 USE_QRCODE=1 USE_NATIVETOR=- innova-qt.pro
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p innova-${{ needs.get-version.outputs.version }}-ubuntu2404-x86_64
          cp src/innovad Innova innova-${{ needs.get-version.outputs.version }}-ubuntu2404-x86_64/
          strip innova-${{ needs.get-version.outputs.version }}-ubuntu2404-x86_64/*
          cd innova-${{ needs.get-version.outputs.version }}-ubuntu2404-x86_64
          sha256sum * > SHA256SUMS.txt
          cd ..
          tar -czf innova-${{ needs.get-version.outputs.version }}-ubuntu2404-x86_64.tar.gz \
            innova-${{ needs.get-version.outputs.version }}-ubuntu2404-x86_64/

      - uses: actions/upload-artifact@v4
        with:
          name: innova-ubuntu2404-x86_64
          path: innova-${{ needs.get-version.outputs.version }}-ubuntu2404-x86_64.tar.gz

  # ─────────────────────────────────────────────────────────
  # Debian 12 x86_64 (daemon + Qt) via Docker container
  # ─────────────────────────────────────────────────────────
  build-debian-12:
    runs-on: ubuntu-22.04
    needs: get-version
    container:
      image: debian:12
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y build-essential libtool autotools-dev automake pkg-config \
            libssl-dev libevent-dev bsdmainutils libboost-all-dev libdb++-dev \
            libminiupnpc-dev libqrencode-dev libcurl4-openssl-dev libgmp-dev \
            libsecp256k1-dev \
            libqt5gui5 libqt5core5a libqt5dbus5 qttools5-dev qttools5-dev-tools \
            libprotobuf-dev protobuf-compiler \
            git

      - name: Build daemon
        run: |
          cd src
          make USE_NATIVETOR=- -f makefile.unix -j$(nproc)

      - name: Build Qt wallet
        run: |
          sed -i 's/LIBS += -lcurl -lssl -lcrypto -lcrypt32 -lssh2 -lgcrypt -lidn2 -lgpg-error -lunistring -lwldap32 -ldb_cxx$$BDB_LIB_SUFFIX/LIBS += -lcurl -lssl -lcrypto -ldb_cxx$$BDB_LIB_SUFFIX/' innova-qt.pro
          strip --remove-section=.note.ABI-tag /usr/lib/x86_64-linux-gnu/libQt5Core.so.5 || true
          qmake USE_UPNP=1 USE_QRCODE=1 USE_NATIVETOR=- innova-qt.pro
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p innova-${{ needs.get-version.outputs.version }}-debian12-x86_64
          cp src/innovad Innova innova-${{ needs.get-version.outputs.version }}-debian12-x86_64/
          strip innova-${{ needs.get-version.outputs.version }}-debian12-x86_64/*
          cd innova-${{ needs.get-version.outputs.version }}-debian12-x86_64
          sha256sum * > SHA256SUMS.txt
          cd ..
          tar -czf innova-${{ needs.get-version.outputs.version }}-debian12-x86_64.tar.gz \
            innova-${{ needs.get-version.outputs.version }}-debian12-x86_64/

      - uses: actions/upload-artifact@v4
        with:
          name: innova-debian12-x86_64
          path: innova-${{ needs.get-version.outputs.version }}-debian12-x86_64.tar.gz

  # ─────────────────────────────────────────────────────────
  # Linux aarch64 (daemon only)
  # ─────────────────────────────────────────────────────────
  build-linux-arm64:
    runs-on: ubuntu-22.04
    needs: get-version
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config \
            libssl-dev libevent-dev bsdmainutils libboost-all-dev libdb++-dev \
            libminiupnpc-dev libqrencode-dev libcurl4-openssl-dev libgmp-dev \
            libsecp256k1-dev gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build daemon
        run: |
          cd src
          make USE_NATIVETOR=- -f makefile.arm -j$(nproc)

      - name: Package
        run: |
          mkdir -p innova-${{ needs.get-version.outputs.version }}-linux-aarch64
          cp src/innovad innova-${{ needs.get-version.outputs.version }}-linux-aarch64/
          strip innova-${{ needs.get-version.outputs.version }}-linux-aarch64/innovad || true
          cd innova-${{ needs.get-version.outputs.version }}-linux-aarch64
          sha256sum * > SHA256SUMS.txt
          cd ..
          tar -czf innova-${{ needs.get-version.outputs.version }}-linux-aarch64.tar.gz \
            innova-${{ needs.get-version.outputs.version }}-linux-aarch64/

      - uses: actions/upload-artifact@v4
        with:
          name: innova-linux-aarch64
          path: innova-${{ needs.get-version.outputs.version }}-linux-aarch64.tar.gz

  # ─────────────────────────────────────────────────────────
  # macOS ARM64 (Apple Silicon) — daemon + Qt
  # ─────────────────────────────────────────────────────────
  build-macos-arm64:
    runs-on: macos-14
    needs: get-version
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          brew install boost openssl@3 berkeley-db@5 miniupnpc libevent qt@5 qrencode \
            curl gmp secp256k1

      - name: Build daemon
        run: |
          cd src
          make -f makefile.osx -j$(sysctl -n hw.ncpu)

      - name: Build Qt wallet
        run: |
          /opt/homebrew/opt/qt@5/bin/qmake USE_UPNP=1 USE_QRCODE=1 innova-qt.pro
          make -j$(sysctl -n hw.ncpu)

      - name: Package
        run: |
          strip src/innovad || true
          mkdir -p dmg_contents
          cp src/innovad dmg_contents/
          if [ -d "Innova.app" ]; then
            strip Innova.app/Contents/MacOS/Innova || true
            cp -R Innova.app dmg_contents/
          elif [ -f "Innova" ]; then
            strip Innova || true
            cp Innova dmg_contents/
          fi
          cd dmg_contents && shasum -a 256 * > SHA256SUMS.txt 2>/dev/null || true && cd ..
          hdiutil create -volname "Innova" -srcfolder dmg_contents \
            -ov -format UDZO innova-${{ needs.get-version.outputs.version }}-macOS-arm64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: innova-macOS-arm64
          path: innova-${{ needs.get-version.outputs.version }}-macOS-arm64.dmg

  # ─────────────────────────────────────────────────────────
  # Windows x86_64 — fully static daemon + Qt via MSYS2
  # ─────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: get-version
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-db
            mingw-w64-x86_64-miniupnpc
            mingw-w64-x86_64-libevent
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-gmp
            mingw-w64-x86_64-qt5-static
            mingw-w64-x86_64-protobuf
            make
            git

      - name: Build LevelDB
        run: |
          cd src/leveldb
          TARGET_OS=NATIVE_WINDOWS make libleveldb.a libmemenv.a -j$(nproc)

      - name: Detect library suffixes
        id: libs
        run: |
          echo "=== Available boost libraries (sample) ==="
          ls /mingw64/lib/libboost_system* 2>/dev/null || echo "  boost_system: (none - header-only)"
          ls /mingw64/lib/libboost_filesystem* 2>/dev/null || echo "  boost_filesystem: (none found)"
          ls /mingw64/lib/libboost_thread* 2>/dev/null || echo "  boost_thread: (none found)"
          echo "=== Available BDB libraries ==="
          ls /mingw64/lib/libdb_cxx* 2>/dev/null || echo "  (none found)"
          echo ""

          # Detect boost suffix from boost_filesystem (boost_system is header-only since 1.69)
          BOOST_LIB=$(find /mingw64/lib -maxdepth 1 -name "libboost_filesystem*.dll.a" -print -quit 2>/dev/null)
          if [ -z "$BOOST_LIB" ]; then
            BOOST_LIB=$(find /mingw64/lib -maxdepth 1 -name "libboost_filesystem*.a" -print -quit 2>/dev/null)
          fi
          if [ -n "$BOOST_LIB" ]; then
            BOOST_SUFFIX=$(basename "$BOOST_LIB" | sed 's/^libboost_filesystem//; s/\.dll\.a$//; s/\.a$//')
            echo "Detected boost suffix: '$BOOST_SUFFIX'"
          else
            BOOST_SUFFIX="-mt"
            echo "WARNING: No boost_filesystem library found, using default '$BOOST_SUFFIX'"
          fi
          echo "boost_suffix=$BOOST_SUFFIX" >> "$GITHUB_OUTPUT"

          # Detect BDB suffix
          BDB_LIB=$(find /mingw64/lib -maxdepth 1 -name "libdb_cxx*.dll.a" -print -quit 2>/dev/null)
          if [ -z "$BDB_LIB" ]; then
            BDB_LIB=$(find /mingw64/lib -maxdepth 1 -name "libdb_cxx*.a" -print -quit 2>/dev/null)
          fi
          if [ -n "$BDB_LIB" ]; then
            BDB_SUFFIX=$(basename "$BDB_LIB" | sed 's/^libdb_cxx//; s/\.dll\.a$//; s/\.a$//')
            echo "Detected BDB suffix: '$BDB_SUFFIX'"
          else
            BDB_SUFFIX=""
            echo "WARNING: No db_cxx library found, using no suffix"
          fi
          echo "bdb_suffix=$BDB_SUFFIX" >> "$GITHUB_OUTPUT"

      - name: Build daemon (fully static)
        run: |
          cd src
          make -f makefile.mingw \
            BOOST_ROOT=/mingw64 \
            BDB_ROOT=/mingw64 \
            OPENSSL_ROOT=/mingw64 \
            LIBEVENT_ROOT=/mingw64 \
            CURL_ROOT=/mingw64 \
            MINIUPNPC_ROOT=/mingw64 \
            BOOST_LIB_SUFFIX="${{ steps.libs.outputs.boost_suffix }}" \
            BDB_LIB_SUFFIX="${{ steps.libs.outputs.bdb_suffix }}" \
            STATIC=1 \
            LDFLAGS="-static -Wl,--dynamicbase -Wl,--nxcompat -Wl,--high-entropy-va" \
            USE_NATIVETOR=- \
            USE_IPFS=1 \
            INNOVA_SPINNER=0 \
            -j$(nproc)

      - name: Build Qt wallet (fully static)
        run: |
          /mingw64/qt5-static/bin/qmake \
            "BOOST_LIB_SUFFIX=${{ steps.libs.outputs.boost_suffix }}" \
            "BOOST_THREAD_LIB_SUFFIX=${{ steps.libs.outputs.boost_suffix }}" \
            "BDB_LIB_SUFFIX=${{ steps.libs.outputs.bdb_suffix }}" \
            "STATIC_LINK=1" \
            "USE_UPNP=1" \
            "USE_NATIVETOR=-" \
            innova-qt.pro
          make -j$(nproc)

      - name: Package
        run: |
          PKGDIR="innova-${{ needs.get-version.outputs.version }}-win64"
          mkdir -p "$PKGDIR"
          cp src/innovad.exe "$PKGDIR/"
          cp release/Innova.exe "$PKGDIR/" 2>/dev/null || true
          [ -f "Innova.exe" ] && cp Innova.exe "$PKGDIR/" || true
          strip "$PKGDIR"/*.exe 2>/dev/null || true
          cd "$PKGDIR"
          sha256sum *.exe > SHA256SUMS.txt 2>/dev/null || true
          cd ..
          "/c/Program Files/7-Zip/7z.exe" a innova-${{ needs.get-version.outputs.version }}-win64.zip "$PKGDIR"/*

      - uses: actions/upload-artifact@v4
        with:
          name: innova-win64
          path: innova-${{ needs.get-version.outputs.version }}-win64.zip

  # ─────────────────────────────────────────────────────────
  # Debian 11 (Bullseye) x86_64 (daemon + Qt) via Docker
  # ─────────────────────────────────────────────────────────
  build-debian-11:
    runs-on: ubuntu-22.04
    needs: get-version
    container:
